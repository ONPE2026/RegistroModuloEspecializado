<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro para el módulo especializado - EG 2026</title>
    <style>
      :root {
        --onpe-azul: #003366;
        --onpe-azul-claro: #e6ecf7;
        --onpe-borde-error: #c41e32;
        --onpe-fondo-error: #fff1f3;
        --onpe-texto-error: #8a1022;
        --onpe-verde: #0a7f5a;
      }

      * { box-sizing: border-box; }

      body {
        font-family: Arial, sans-serif;
        padding: 20px;
        max-width: 800px;
        margin: 0 auto;
        line-height: 1.4;
        background-color: #f5f7fb;
        color: #1f2937;
      }

      h1 {
        margin-bottom: 5px;
        color: var(--onpe-azul);
        text-align: center;
        font-size: 1.8rem;
      }

      h2 {
        margin-bottom: 5px;
      }

      p { margin-top: 0.75rem; }

      fieldset {
        margin-top: 15px;
        padding: 15px;
        border-radius: 5px;
        border: 1px solid var(--onpe-azul-claro);
        background-color: #ffffff;
      }

      legend {
        font-weight: bold;
        color: var(--onpe-azul);
      }

      label {
        display: block;
        margin-top: 8px;
      }

      .inline-label {
        display: inline-block;
        margin-right: 15px;
        margin-top: 10px;
      }

      select,
      input[type="text"],
      input[type="email"],
      button {
        padding: 8px 10px;
        margin-top: 5px;
        min-width: 220px;
        border: 1px solid #c7d3e5;
        border-radius: 4px;
        font-size: 0.98rem;
      }

      input[type="radio"] {
        margin-right: 6px;
      }

      .seccion-oculta {
        display: none;
      }

      .boton {
        margin-top: 20px;
        padding: 12px 18px;
        font-size: 1rem;
        cursor: pointer;
        background-color: var(--onpe-azul);
        color: #ffffff;
        border: none;
        border-radius: 4px;
      }

      .boton:hover {
        opacity: 0.92;
      }

      .boton:disabled {
        opacity: 0.65;
        cursor: not-allowed;
      }

      .mensaje {
        margin-top: 15px;
        font-weight: bold;
        color: var(--onpe-azul);
      }

      .banner {
        max-width: 100%;
        height: auto;
        margin: 10px auto 20px auto;
        display: block;
      }

      .opciones-verticales label {
        display: block;
        margin-top: 6px;
      }

      .campo {
        margin-top: 12px;
      }

      .campo.tiene-error select,
      .campo.tiene-error input,
      .campo.tiene-error .grupo-radios {
        border-color: var(--onpe-borde-error);
      }

      .grupo-radios {
        margin-top: 6px;
        padding: 4px 0;
      }

      .field-error {
        display: none;
        margin-top: 6px;
        padding: 8px 10px;
        border-radius: 4px;
        background-color: var(--onpe-fondo-error);
        color: var(--onpe-texto-error);
        font-size: 0.93rem;
      }

      .field-error.activo {
        display: block;
      }


      .mensaje-global {
        display: none;
        margin-top: 16px;
        padding: 12px 14px;
        border-radius: 4px;
        font-weight: bold;
      }

      .mensaje-global.error {
        display: block;
        background: var(--onpe-fondo-error);
        color: var(--onpe-texto-error);
      }

      .mensaje-global.ok {
        display: block;
        background: #edf9f3;
        color: var(--onpe-verde);
      }

      .pantalla-final {
        max-width: 800px;
        margin: 40px auto;
        font-family: Arial, sans-serif;
        text-align: center;
        background: #ffffff;
        border: 1px solid var(--onpe-azul-claro);
        border-radius: 6px;
        padding: 28px 20px;
      }

      .pantalla-final h1 {
        margin-top: 0;
      }

      .iframe-oculto {
        width: 0;
        height: 0;
        border: 0;
        visibility: hidden;
        position: absolute;
      }

      /* 📱 Ajustes para celular */
      @media (max-width: 600px) {
        body {
          padding: 10px;
          font-size: 15px;
        }

        h1 {
          font-size: 1.45rem;
        }

        fieldset {
          padding: 12px;
        }

        select,
        input[type="text"],
        input[type="email"],
        button {
          width: 100%;
          min-width: 0;
        }

        .inline-label {
          display: block;
          margin-right: 0;
          margin-top: 8px;
        }

      }
    </style>
  </head>

  <body>
    <h1>Registro para el módulo especializado de la web de resultados de las Elecciones Generales 2026</h1>

    <img
      src="https://onpe2026.github.io/Encuesta/banner.jpg"
      alt="Banner ONPE EG 2026"
      class="banner"
    />

    <p>Complete la siguiente información. Todas las preguntas son obligatorias.</p>


    <form id="formRegistro" novalidate>
      <fieldset>
        <legend>Datos de la institución o entidad</legend>

        <div class="campo" id="campoTipoInstitucion">
          <label>Seleccione el tipo de institución o entidad que realiza el registro</label>
          <div class="grupo-radios opciones-verticales">
            <label><input type="radio" name="tipoInstitucion" value="institucion_publica" /> Instituciones y entidades públicas</label>
            <label><input type="radio" name="tipoInstitucion" value="organizacion_politica" /> Organización política</label>
            <label><input type="radio" name="tipoInstitucion" value="mision_observacion" /> Misión de observación</label>
            <label><input type="radio" name="tipoInstitucion" value="encuestadora_vigente" /> Encuestadoras vigentes</label>
          </div>
          <div class="field-error"></div>
        </div>

        <div class="campo seccion-oculta" id="campoEntidadSeleccion">
          <label id="labelEntidadSeleccion" for="entidadSeleccion">Seleccione una opción</label>
          <select id="entidadSeleccion">
            <option value="">-- Seleccione una opción --</option>
          </select>
          <div class="field-error"></div>
        </div>

        <div class="campo seccion-oculta" id="campoRucInstitucion">
          <label for="rucInstitucion">Ingrese el RUC de la institución o entidad</label>
          <input id="rucInstitucion" type="text" inputmode="numeric" maxlength="11" autocomplete="off" />
          <div class="field-error"></div>
        </div>

        <div class="campo seccion-oculta" id="campoPaisMision">
          <label for="paisMision">Seleccione el país de la misión de observación</label>
          <select id="paisMision">
            <option value="">-- Seleccione un país --</option>
          </select>
          <div class="field-error"></div>
        </div>
      </fieldset>

      <fieldset>
        <legend>Datos de la persona responsable del registro</legend>

        <div class="campo" id="campoTipoDocumento">
          <label for="tipoDocumento">Seleccione el tipo de documento de identidad</label>
          <select id="tipoDocumento">
            <option value="">-- Seleccione el tipo de documento --</option>
            <option value="dni_cedula">DNI / Cédula de identidad</option>
            <option value="carnet_extranjeria">Carnet de Extranjería</option>
          </select>
          <div class="field-error"></div>
        </div>

        <div class="campo" id="campoNumeroDocumento">
          <label for="numeroDocumento">Ingrese el número de documento de identidad</label>
          <input id="numeroDocumento" type="text" inputmode="numeric" maxlength="15" autocomplete="off" />
          <div class="field-error"></div>
        </div>

        <div class="campo" id="campoNombreCompleto">
          <label for="nombreCompleto">Ingrese los nombres y apellidos de la persona responsable del registro</label>
          <input id="nombreCompleto" type="text" maxlength="150" autocomplete="name" />
          <div class="field-error"></div>
        </div>

        <div class="campo" id="campoCelular">
          <label for="celular">Ingrese el número de celular</label>
          <input id="celular" type="text" inputmode="numeric" maxlength="9" autocomplete="off" />
          <div class="field-error"></div>
        </div>

        <div class="campo" id="campoConfirmarCelular">
          <label for="confirmarCelular">Confirme el número de celular</label>
          <input id="confirmarCelular" type="text" inputmode="numeric" maxlength="9" autocomplete="off" />
          <div class="field-error"></div>
        </div>

        <div class="campo" id="campoCorreo">
          <label for="correoElectronico">Ingrese el correo electrónico</label>
          <input id="correoElectronico" type="email" maxlength="150" autocomplete="off" />
          <div class="field-error"></div>
        </div>

        <div class="campo" id="campoConfirmarCorreo">
          <label for="confirmarCorreoElectronico">Confirme el correo electrónico</label>
          <input id="confirmarCorreoElectronico" type="email" maxlength="150" autocomplete="off" />
          <div class="field-error"></div>
        </div>
      </fieldset>

      <button id="btnEnviar" type="submit" class="boton">Enviar registro</button>
      <div id="mensajeGlobal" class="mensaje-global" role="alert"></div>
    </form>

    <iframe id="submitFrame" name="submitFrame" class="iframe-oculto"></iframe>

    <script>
      // Reemplaza esta URL por la de tu Web App de Apps Script (/exec)
      const API_URL = 'PEGAR_AQUI_URL_WEB_APP';

      // Si alojas el HTML y los JSON en la misma carpeta, no cambies esta ruta.
      const LISTAS_BASE_PATH = './';

      const JSON_FILES = {
        institucion_publica: 'instituciones_publicas.json',
        organizacion_politica: 'organizaciones_politicas.json',
        mision_observacion: 'misiones_observacion.json',
        encuestadora_vigente: 'encuestadoras_vigentes.json',
        paises: 'paises.json'
      };

      const LABELS_ENTIDAD = {
        institucion_publica: 'Seleccione el nombre de la institución o entidad pública',
        organizacion_politica: 'Seleccione la organización política',
        mision_observacion: 'Seleccione la misión de observación',
        encuestadora_vigente: 'Seleccione la encuestadora vigente'
      };

      const PLACEHOLDERS_ENTIDAD = {
        institucion_publica: '-- Seleccione la institución o entidad pública --',
        organizacion_politica: '-- Seleccione la organización política --',
        mision_observacion: '-- Seleccione la misión de observación --',
        encuestadora_vigente: '-- Seleccione la encuestadora vigente --'
      };

      const state = {
        catalogos: {},
        pendingRequests: new Map()
      };

      const form = document.getElementById('formRegistro');
      const btnEnviar = document.getElementById('btnEnviar');
      const mensajeGlobal = document.getElementById('mensajeGlobal');

      const campoTipoInstitucion = document.getElementById('campoTipoInstitucion');
      const campoEntidadSeleccion = document.getElementById('campoEntidadSeleccion');
      const campoRucInstitucion = document.getElementById('campoRucInstitucion');
      const campoPaisMision = document.getElementById('campoPaisMision');

      const entidadSeleccion = document.getElementById('entidadSeleccion');
      const labelEntidadSeleccion = document.getElementById('labelEntidadSeleccion');
      const rucInstitucion = document.getElementById('rucInstitucion');
      const paisMision = document.getElementById('paisMision');
      const tipoDocumento = document.getElementById('tipoDocumento');
      const numeroDocumento = document.getElementById('numeroDocumento');
      const nombreCompleto = document.getElementById('nombreCompleto');
      const celular = document.getElementById('celular');
      const confirmarCelular = document.getElementById('confirmarCelular');
      const correoElectronico = document.getElementById('correoElectronico');
      const confirmarCorreoElectronico = document.getElementById('confirmarCorreoElectronico');

      window.addEventListener('load', inicializar);
      window.addEventListener('message', manejarRespuestaIframe);

      async function inicializar() {
        try {
          await cargarCatalogos();
          configurarEventos();
          actualizarCamposCondicionales();
        } catch (error) {
          console.error(error);
          mostrarMensajeGlobal('Ocurrió un problema al cargar las listas del formulario. Revise las rutas de los archivos JSON e intente nuevamente.', 'error');
          btnEnviar.disabled = true;
        }
      }

      async function cargarCatalogos() {
        const entries = Object.entries(JSON_FILES);
        const resultados = await Promise.all(
          entries.map(async ([key, file]) => {
            const response = await fetch(LISTAS_BASE_PATH + file, { cache: 'no-store' });
            if (!response.ok) {
              throw new Error('No se pudo cargar ' + file);
            }
            return [key, await response.json()];
          })
        );

        resultados.forEach(([key, data]) => {
          state.catalogos[key] = Array.isArray(data) ? data : [];
        });

        poblarPaises();
      }

      function configurarEventos() {
        document.querySelectorAll('input[name="tipoInstitucion"]').forEach((radio) => {
          radio.addEventListener('change', () => {
            limpiarError(campoTipoInstitucion);
            actualizarCamposCondicionales();
            });
        });

        entidadSeleccion.addEventListener('change', () => {
          limpiarError(campoEntidadSeleccion);
        });

        rucInstitucion.addEventListener('input', () => {
          rucInstitucion.value = soloDigitos(rucInstitucion.value).slice(0, 11);
          limpiarError(campoRucInstitucion);
        });

        paisMision.addEventListener('change', () => {
          limpiarError(campoPaisMision);
        });

        tipoDocumento.addEventListener('change', () => {
          limpiarError(document.getElementById('campoTipoDocumento'));
        });

        numeroDocumento.addEventListener('input', () => {
          numeroDocumento.value = soloDigitos(numeroDocumento.value).slice(0, 15);
          limpiarError(document.getElementById('campoNumeroDocumento'));
        });

        nombreCompleto.addEventListener('input', () => {
          limpiarError(document.getElementById('campoNombreCompleto'));
        });

        [celular, confirmarCelular].forEach((input) => {
          input.addEventListener('input', () => {
            input.value = soloDigitos(input.value).slice(0, 9);
            limpiarError(input.closest('.campo'));
            });
        });

        [correoElectronico, confirmarCorreoElectronico].forEach((input) => {
          input.addEventListener('input', () => {
            limpiarError(input.closest('.campo'));
            });
        });

        form.addEventListener('submit', enviarFormulario);
      }

      function actualizarCamposCondicionales() {
        const tipo = obtenerTipoInstitucionSeleccionado();
        const mostrarEntidad = Boolean(tipo);
        const mostrarRuc = tipo === 'institucion_publica' || tipo === 'encuestadora_vigente';
        const mostrarPais = tipo === 'mision_observacion';

        toggleSeccion(campoEntidadSeleccion, mostrarEntidad);
        toggleSeccion(campoRucInstitucion, mostrarRuc);
        toggleSeccion(campoPaisMision, mostrarPais);

        if (mostrarEntidad) {
          poblarEntidad(tipo);
        } else {
          entidadSeleccion.innerHTML = '<option value="">-- Seleccione una opción --</option>';
        }

        if (!mostrarRuc) {
          rucInstitucion.value = '';
          limpiarError(campoRucInstitucion);
        }

        if (!mostrarPais) {
          paisMision.value = '';
          limpiarError(campoPaisMision);
        }
      }

      function toggleSeccion(elemento, visible) {
        elemento.classList.toggle('seccion-oculta', !visible);
      }

      function poblarEntidad(tipo) {
        const lista = state.catalogos[tipo] || [];
        labelEntidadSeleccion.textContent = LABELS_ENTIDAD[tipo] || 'Seleccione una opción';

        entidadSeleccion.innerHTML = '';
        const optionDefault = document.createElement('option');
        optionDefault.value = '';
        optionDefault.textContent = PLACEHOLDERS_ENTIDAD[tipo] || '-- Seleccione una opción --';
        entidadSeleccion.appendChild(optionDefault);

        lista.forEach((item) => {
          const option = document.createElement('option');
          option.value = item.id;
          option.textContent = item.nombre;
          entidadSeleccion.appendChild(option);
        });
      }

      function poblarPaises() {
        const lista = state.catalogos.paises || [];
        paisMision.innerHTML = '<option value="">-- Seleccione un país --</option>';
        lista.forEach((item) => {
          const option = document.createElement('option');
          option.value = item.codigo;
          option.textContent = item.nombre;
          paisMision.appendChild(option);
        });
      }

      function obtenerTipoInstitucionSeleccionado() {
        const checked = document.querySelector('input[name="tipoInstitucion"]:checked');
        return checked ? checked.value : '';
      }

      function getEntidadSeleccionada() {
        const tipo = obtenerTipoInstitucionSeleccionado();
        const lista = state.catalogos[tipo] || [];
        const id = entidadSeleccion.value;
        const encontrado = lista.find((item) => item.id === id);
        return encontrado || null;
      }

      function getPaisSeleccionado() {
        const codigo = paisMision.value;
        const lista = state.catalogos.paises || [];
        return lista.find((item) => item.codigo === codigo) || null;
      }

      function soloDigitos(valor) {
        return String(valor || '').replace(/\D+/g, '');
      }

      function valorLimpio(valor) {
        return String(valor || '').trim();
      }

      function normalizarCorreo(valor) {
        return valorLimpio(valor).toLowerCase();
      }

      function esCorreoValido(valor) {
        return /^[^\s@]+@[^\s@]+$/.test(valor);
      }

      function mostrarError(campo, mensaje) {
        if (!campo) return;
        campo.classList.add('tiene-error');
        const errorBox = campo.querySelector('.field-error');
        if (errorBox) {
          errorBox.textContent = mensaje;
          errorBox.classList.add('activo');
        }
      }

      function limpiarError(campo) {
        if (!campo) return;
        campo.classList.remove('tiene-error');
        const errorBox = campo.querySelector('.field-error');
        if (errorBox) {
          errorBox.textContent = '';
          errorBox.classList.remove('activo');
        }
      }

      function limpiarErroresFormulario() {
        document.querySelectorAll('.campo').forEach((campo) => limpiarError(campo));
        ocultarMensajeGlobal();
      }

      function mostrarMensajeGlobal(texto, tipo) {
        mensajeGlobal.textContent = texto;
        mensajeGlobal.className = 'mensaje-global ' + tipo;
      }

      function ocultarMensajeGlobal() {
        mensajeGlobal.textContent = '';
        mensajeGlobal.className = 'mensaje-global';
      }

      function obtenerCamposVisibles() {
        const visibles = [campoTipoInstitucion, document.getElementById('campoTipoDocumento'), document.getElementById('campoNumeroDocumento'), document.getElementById('campoNombreCompleto'), document.getElementById('campoCelular'), document.getElementById('campoConfirmarCelular'), document.getElementById('campoCorreo'), document.getElementById('campoConfirmarCorreo')];
        if (!campoEntidadSeleccion.classList.contains('seccion-oculta')) visibles.splice(1, 0, campoEntidadSeleccion);
        if (!campoRucInstitucion.classList.contains('seccion-oculta')) visibles.splice(2, 0, campoRucInstitucion);
        if (!campoPaisMision.classList.contains('seccion-oculta')) visibles.splice(3, 0, campoPaisMision);
        return visibles;
      }

      function validarFormulario(modo = 'submit') {
        if (modo === 'submit') limpiarErroresFormulario();

        const errores = [];
        const tipo = obtenerTipoInstitucionSeleccionado();
        const entidad = getEntidadSeleccionada();
        const pais = getPaisSeleccionado();
        const ruc = soloDigitos(rucInstitucion.value);
        const doc = soloDigitos(numeroDocumento.value);
        const nombre = valorLimpio(nombreCompleto.value);
        const cel = soloDigitos(celular.value);
        const cel2 = soloDigitos(confirmarCelular.value);
        const correo = normalizarCorreo(correoElectronico.value);
        const correo2 = normalizarCorreo(confirmarCorreoElectronico.value);

        if (!tipo) {
          errores.push({ campo: campoTipoInstitucion, mensaje: 'Seleccione el tipo de institución o entidad.' });
        }

        if (!campoEntidadSeleccion.classList.contains('seccion-oculta') && !entidad) {
          errores.push({ campo: campoEntidadSeleccion, mensaje: 'Seleccione una opción de la lista correspondiente.' });
        }

        if (!campoRucInstitucion.classList.contains('seccion-oculta')) {
          if (!ruc) {
            errores.push({ campo: campoRucInstitucion, mensaje: 'Ingrese el RUC de la institución o entidad.' });
          } else if (!/^\d{11}$/.test(ruc)) {
            errores.push({ campo: campoRucInstitucion, mensaje: 'El RUC debe tener exactamente 11 dígitos.' });
          }
        }

        if (!campoPaisMision.classList.contains('seccion-oculta') && !pais) {
          errores.push({ campo: campoPaisMision, mensaje: 'Seleccione el país de la misión de observación.' });
        }

        if (!tipoDocumento.value) {
          errores.push({ campo: document.getElementById('campoTipoDocumento'), mensaje: 'Seleccione el tipo de documento de identidad.' });
        }

        if (!doc) {
          errores.push({ campo: document.getElementById('campoNumeroDocumento'), mensaje: 'Ingrese el número de documento de identidad.' });
        } else if (!/^\d{6,15}$/.test(doc)) {
          errores.push({ campo: document.getElementById('campoNumeroDocumento'), mensaje: 'Ingrese solo números y una longitud entre 6 y 15 dígitos.' });
        }

        if (!nombre) {
          errores.push({ campo: document.getElementById('campoNombreCompleto'), mensaje: 'Ingrese sus nombres y apellidos completos.' });
        } else if (nombre.length < 5) {
          errores.push({ campo: document.getElementById('campoNombreCompleto'), mensaje: 'Ingrese sus nombres y apellidos completos.' });
        }

        if (!cel) {
          errores.push({ campo: document.getElementById('campoCelular'), mensaje: 'Ingrese un número de celular.' });
        } else if (!/^\d{9}$/.test(cel)) {
          errores.push({ campo: document.getElementById('campoCelular'), mensaje: 'Ingrese un número de celular válido de 9 dígitos.' });
        }

        if (!cel2) {
          errores.push({ campo: document.getElementById('campoConfirmarCelular'), mensaje: 'Confirme el número de celular.' });
        } else if (!/^\d{9}$/.test(cel2)) {
          errores.push({ campo: document.getElementById('campoConfirmarCelular'), mensaje: 'Confirme un número de celular válido de 9 dígitos.' });
        } else if (cel !== cel2) {
          errores.push({ campo: document.getElementById('campoConfirmarCelular'), mensaje: 'El número de celular no coincide con la confirmación.' });
        }

        if (!correo) {
          errores.push({ campo: document.getElementById('campoCorreo'), mensaje: 'Ingrese el correo electrónico.' });
        } else if (!esCorreoValido(correo)) {
          errores.push({ campo: document.getElementById('campoCorreo'), mensaje: 'Ingrese un correo electrónico válido que incluya @.' });
        }

        if (!correo2) {
          errores.push({ campo: document.getElementById('campoConfirmarCorreo'), mensaje: 'Confirme el correo electrónico.' });
        } else if (correo !== correo2) {
          errores.push({ campo: document.getElementById('campoConfirmarCorreo'), mensaje: 'El correo electrónico no coincide con la confirmación.' });
        }

        if (modo === 'submit' && errores.length) {
          errores.forEach((error) => mostrarError(error.campo, error.mensaje));
          mostrarMensajeGlobal('Revise los campos resaltados antes de enviar el registro.', 'error');
          errores[0].campo.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        return { valido: errores.length === 0, errores };
      }

      function construirPayload() {
        const tipo = obtenerTipoInstitucionSeleccionado();
        const entidad = getEntidadSeleccionada();
        const pais = getPaisSeleccionado();

        return {
          tipoInstitucion: tipo,
          tipoInstitucionLabel: obtenerLabelTipo(tipo),
          entidadId: entidad ? entidad.id : '',
          entidadNombre: entidad ? entidad.nombre : '',
          paisCodigo: pais ? pais.codigo : '',
          paisNombre: pais ? pais.nombre : '',
          ruc: soloDigitos(rucInstitucion.value),
          tipoDocumento: tipoDocumento.value,
          tipoDocumentoLabel: tipoDocumento.options[tipoDocumento.selectedIndex] ? tipoDocumento.options[tipoDocumento.selectedIndex].textContent : '',
          numeroDocumento: soloDigitos(numeroDocumento.value),
          nombreCompleto: valorLimpio(nombreCompleto.value),
          celular: soloDigitos(celular.value),
          correoElectronico: normalizarCorreo(correoElectronico.value)
        };
      }

      function obtenerLabelTipo(tipo) {
        const mapa = {
          institucion_publica: 'Instituciones y entidades públicas',
          organizacion_politica: 'Organización política',
          mision_observacion: 'Misión de observación',
          encuestadora_vigente: 'Encuestadoras vigentes'
        };
        return mapa[tipo] || '';
      }

      async function enviarFormulario(event) {
        event.preventDefault();
        const validacion = validarFormulario('submit');

        if (!validacion.valido) return;
        if (!API_URL || API_URL === 'https://script.google.com/macros/s/AKfycbyVPgp8Ym92KCTjzdjabHYWbbxhNpw2_eNbdK_WmgAoe53rK2MVDFgo_NjE1GjyfOjP/exec') {
          mostrarMensajeGlobal('Debe actualizar la constante API_URL con la URL de su Web App antes de publicar el formulario.', 'error');
          return;
        }

        btnEnviar.disabled = true;
        mostrarMensajeGlobal('Validando la institución o entidad registrada...', 'ok');

        const payload = construirPayload();

        try {
          const verificacion = await postToAppsScript('checkInstitution', {
            tipoInstitucion: payload.tipoInstitucion,
            entidadId: payload.entidadId,
            paisCodigo: payload.paisCodigo
          });

          if (verificacion.status === 'duplicate') {
            mostrarError(campoEntidadSeleccion, 'Esta institución o entidad ya cuenta con un registro previo y no puede volver a registrarse.');
            mostrarMensajeGlobal('La institución o entidad seleccionada ya se encuentra registrada.', 'error');
            campoEntidadSeleccion.scrollIntoView({ behavior: 'smooth', block: 'center' });
            btnEnviar.disabled = false;
            return;
          }

          mostrarMensajeGlobal('Enviando registro...', 'ok');
          const respuesta = await postToAppsScript('submitRegistration', payload);

          if (respuesta.status === 'success') {
            mostrarPantallaFinal();
            return;
          }

          if (respuesta.status === 'duplicate') {
            mostrarError(campoEntidadSeleccion, 'Esta institución o entidad ya cuenta con un registro previo y no puede volver a registrarse.');
            mostrarMensajeGlobal('La institución o entidad seleccionada ya se encuentra registrada.', 'error');
            campoEntidadSeleccion.scrollIntoView({ behavior: 'smooth', block: 'center' });
          } else {
            mostrarMensajeGlobal(respuesta.message || 'Ocurrió un error al enviar el registro. Intente nuevamente.', 'error');
          }
        } catch (error) {
          console.error(error);
          mostrarMensajeGlobal('No se pudo completar el envío. Revise la publicación de la Web App e intente nuevamente.', 'error');
        } finally {
          btnEnviar.disabled = false;
        }
      }

      function mostrarPantallaFinal() {
        document.body.innerHTML = `
          <div class="pantalla-final">
            <h1 style="color:#003366;">Registro completado</h1>
            <p>Se ha realizado el registro correctamente. Muchas gracias por su participación.</p>
          </div>
        `;
      }

      function postToAppsScript(action, payload) {
        return new Promise((resolve, reject) => {
          const requestId = `req_${Date.now()}_${Math.random().toString(36).slice(2)}`;
          const timeoutId = window.setTimeout(() => {
            state.pendingRequests.delete(requestId);
            reject(new Error('Tiempo de espera agotado.'));
          }, 25000);

          state.pendingRequests.set(requestId, { resolve, reject, timeoutId });
          enviarPostOculto({ action, requestId, ...payload });
        });
      }

      function enviarPostOculto(data) {
        const tempForm = document.createElement('form');
        tempForm.method = 'POST';
        tempForm.action = API_URL;
        tempForm.target = 'submitFrame';
        tempForm.style.display = 'none';

        Object.entries(data).forEach(([key, value]) => {
          const input = document.createElement('input');
          input.type = 'hidden';
          input.name = key;
          input.value = value == null ? '' : String(value);
          tempForm.appendChild(input);
        });

        document.body.appendChild(tempForm);
        tempForm.submit();
        window.setTimeout(() => tempForm.remove(), 500);
      }

      function manejarRespuestaIframe(event) {
        const data = event.data;
        if (!data || data.source !== 'onpe-registro-webapp' || !data.requestId) return;

        const pending = state.pendingRequests.get(data.requestId);
        if (!pending) return;

        clearTimeout(pending.timeoutId);
        state.pendingRequests.delete(data.requestId);
        pending.resolve(data);
      }
    </script>
  </body>
</html>
